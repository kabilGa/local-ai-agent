services:

  # ── RAG API ──────────────────────────────────────────────────────────────────
  rag-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"    # REST API
      - "9090:9090"    # Prometheus metrics (expose separately in prod)
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      EMBEDDING_MODEL_URL: ""          # empty = fastembed local (no GPU server)
      EMBEDDING_MODEL_NAME: nomic-ai/nomic-embed-code
      EMBEDDING_MODEL_VERSION: v1-0
      RERANKER_ENABLED: "false"
      GIT_WORKSPACE: /tmp/rag-repos
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      SECRET_SCANNER_ENABLED: "true"
      CACHE_ENABLED: "true"
      LOG_LEVEL: info
    volumes:
      - git_workspace:/tmp/rag-repos
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rag-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Qdrant ────────────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.0
    ports:
      - "6333:6333"    # HTTP REST
      - "6334:6334"    # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    networks:
      - rag-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save ""
      --appendonly no
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    networks:
      - rag-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Optional: HuggingFace TEI embedding server (requires GPU) ────────────────
  # Uncomment if you have a GPU and want faster embeddings than fastembed local.
  #
  # embedding-server:
  #   image: ghcr.io/huggingface/text-embeddings-inference:latest
  #   command: --model-id BAAI/bge-m3 --port 8080
  #   ports:
  #     - "8080:8080"
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - capabilities: [gpu]
  #   networks:
  #     - rag-internal
  #   restart: unless-stopped

  # ── Optional: Reranker server ─────────────────────────────────────────────────
  # Uncomment to enable cross-encoder reranking (requires GPU).
  #
  # reranker-server:
  #   image: ghcr.io/huggingface/text-embeddings-inference:latest
  #   command: --model-id BAAI/bge-reranker-v2-m3 --port 8081
  #   ports:
  #     - "8081:8081"
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - capabilities: [gpu]
  #   networks:
  #     - rag-internal

volumes:
  qdrant_data:
    driver: local
  git_workspace:
    driver: local

networks:
  rag-internal:
    driver: bridge
    internal: false    # Set to true in production for network isolation
